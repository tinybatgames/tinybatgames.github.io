<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Pixel Farm</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: sans-serif;
      }
      #unity-container {
        position: absolute;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #0a0a0a;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        background: #0a0a0a;
        outline: none;
      }
      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #d4d4d4;
        z-index: 10;
      }
      #unity-progress-bar-empty {
        width: 280px;
        height: 18px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 4px;
        overflow: hidden;
        margin: 12px auto 0;
      }
      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #4caf50, #8bc34a);
        transition: width 0.15s ease-out;
      }
      #unity-fullscreen-button {
        position: absolute;
        right: 14px;
        bottom: 14px;
        width: 40px;
        height: 40px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 18px;
        z-index: 5;
        transition: background 0.15s;
      }
      #unity-fullscreen-button:hover {
        background: rgba(0, 0, 0, 0.8);
      }
      #unity-warning {
        position: absolute;
        left: 50%;
        top: 5%;
        transform: translateX(-50%);
        background: #b71c1c;
        color: #fff;
        padding: 10px 16px;
        border-radius: 4px;
        max-width: 80%;
        z-index: 20;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div>Yükleniyor...</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <button id="unity-fullscreen-button" type="button" title="Tam Ekran (F)">⛶</button>
      <div id="unity-warning"></div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        warningBanner.innerText = msg;
        warningBanner.style.display = "block";
        warningBanner.style.background = type === "error" ? "#b71c1c" : "#f57f17";
        if (type !== "error") setTimeout(function () { warningBanner.style.display = "none"; }, 5000);
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/PixelFarm.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/PixelFarm.data.unityweb",
        frameworkUrl: buildUrl + "/PixelFarm.framework.js.unityweb",
        codeUrl: buildUrl + "/PixelFarm.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "TinyBatGames",
        productName: "Pixel Farm",
        productVersion: "1.0",
        matchWebGLToCanvasSize: true,
        devicePixelRatio: window.devicePixelRatio || 1,
        showBanner: unityShowBanner,
      };

      function resizeCanvas() {
        // CSS canvas'ı viewport'a uyduruyor; render çözünürlüğünü de eşleştir.
        var dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then(function (unityInstance) {
          loadingBar.style.display = "none";
          fullscreenButton.addEventListener("click", function () {
            unityInstance.SetFullscreen(1);
          });
          // F tuşu ile tam ekran kısayolu
          window.addEventListener("keydown", function (e) {
            if (e.key === "f" || e.key === "F") unityInstance.SetFullscreen(1);
          });
        }).catch(function (message) {
          unityShowBanner(message, "error");
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
